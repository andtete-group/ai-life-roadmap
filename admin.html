<!doctype html>
<html lang="ja">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>運営管理画面 | あいらいふ</title><link rel="stylesheet" href="./styles.css?v=2"></head>
<body>
  <main id="adminLogin" class="auth-page"><section class="auth-story"><a class="academy-logo" href="./"><span>AI</span><b>あいらいふ<small>MANAGEMENT STUDIO</small></b></a><div><p class="kicker">FOR OPERATORS</p><h1>コンテンツを、<br><em>育てる場所。</em></h1><p>YouTube動画とサムネイルを章ごとに整理し、会員へ届けます。</p></div></section><section class="auth-panel"><form id="adminLoginForm" class="login-card"><p class="kicker">ADMIN LOGIN</p><h2>運営管理画面</h2><label>ユーザー名<input name="username" required placeholder="AILIFE"></label><label>パスワード<input name="password" type="password" required placeholder="••••••••"></label><p id="adminError" class="error"></p><button class="primary">管理画面へ →</button></form></section></main>
  <div id="adminView" hidden><header class="top"><a class="academy-logo dark" href="./"><span>AI</span><b>あいらいふ<small>MANAGEMENT STUDIO</small></b></a><nav><a href="./" target="_blank">会員画面を見る ↗</a><button id="adminLogout" class="quiet">ログアウト</button></nav></header><main class="wrap"><p class="kicker">CONTENT EDITOR</p><h1>教材を追加・管理</h1><div class="admin-grid"><form id="lessonForm" class="content-form"><label>章<select name="chapter_id" id="chapterSelect"></select></label><label>タイトル<input name="title" required placeholder="例：ChatGPTとCodexの全体像"></label><label>説明文<textarea name="body" rows="5" placeholder="会員に表示する説明"></textarea></label><label>YouTube限定公開URL<input name="youtube_url" type="url" required placeholder="https://youtu.be/..."></label><label>サムネイル画像<input name="thumbnail" type="file" accept="image/jpeg,image/png,image/webp" required><small>JPG・PNG・WebP、2MB以内</small></label><button class="primary">教材を追加する</button><p id="saveStatus"></p></form><section class="content-list"><h2>登録済みの教材</h2><div id="adminLessons"></div></section></div></main></div>
  <script type="module" src="./admin.js?v=2"></script>
</body>
</html>
